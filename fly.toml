app = "hot-stock-app"
primary_region = "nrt"

[build]

# 프로세스 정의
[processes]
  web       = "streamlit run app.py --server.port=7860 --server.address=0.0.0.0 --server.headless=true --server.enableCORS=false"
  scheduler = "python scheduler.py"

[http_service]
  internal_port = 7860
  force_https = true
  auto_stop_machines = "stop"    # 접속 없으면 자동 중지
  auto_start_machines = true     # 접속 시 자동 시작
  min_machines_running = 0       # 평소엔 0대 유지
  processes = ["web"]

# web VM (접속 시에만 실행)
[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["web"]

# scheduler VM (별도 머신)
[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["scheduler"]
