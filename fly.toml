app = "hot-stock-app"
primary_region = "nrt"

[build]

[mounts]
  source = "hotstock_data"
  destination = "/data"

# 프로세스 정의
[processes]
  web       = "streamlit run app.py --server.port=7860 --server.address=0.0.0.0 --server.headless=true --server.enableCORS=false"
  scheduler = "python scheduler.py"

[http_service]
  internal_port = 7860
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["web"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/"

# web VM (접속 시에만 실행)
[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["web"]

# scheduler VM (별도 머신)
[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["scheduler"]
