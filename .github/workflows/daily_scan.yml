name: Daily Stock Scan & Telegram Alert

on:
  schedule:
    - cron: '54 7 * * *'  # 테스트용 KST 16:54
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests beautifulsoup4 matplotlib

      - name: Run
        run: python github_scan.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Keep workflow active (prevent auto-disable)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .last_run
          git add .last_run
          git diff --staged --quiet || git commit -m "chore: keep workflow active [skip ci]"
          git push
