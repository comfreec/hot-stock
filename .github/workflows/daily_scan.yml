name: Daily Stock Scan & Telegram Alert

on:
  schedule:
    - cron: '40 6 * * 1-5'
    - cron: '10 0 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests beautifulsoup4 matplotlib

      - name: Run
        run: |
          HOUR=$(date -u +%H)
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "workflow_dispatch" ]; then
            python github_scan.py
          elif [ "$HOUR" = "00" ]; then
            python performance_update.py
          else
            python github_scan.py
          fi
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
